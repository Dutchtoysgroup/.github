name: Bug report
description: Report something that's broken or not working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below so we can investigate quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
      placeholder: When I do X, Y happens. I expected Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Where did this happen?
      options:
        - Production
        - Staging
        - Local development
        - Not sure
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL or location
      description: If applicable, the URL, marketplace, or system where this occurred
      placeholder: e.g. exittoys.nl/product/123 or ChannelEngine NL

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Drag screenshots or paste error logs here
