name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make things better? Let us know below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or use case this feature would address.
      placeholder: Right now, doing X is painful because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you thought about other approaches? Why didn't they work?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Would improve daily work
        - Blocking something important
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else we should know? Links, mockups, examples?
